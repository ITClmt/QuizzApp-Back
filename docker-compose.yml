services:
  dev-db:
    image: postgres:18
    container_name: nest-db
    restart: always
    environment:
      POSTGRES_USER: nestuser
      POSTGRES_PASSWORD: nestpassword
      POSTGRES_DB: nestdb
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - nestdb_data:/var/lib/postgresql/data

volumes:
  nestdb_data:
